name: CI - Contatodo Web

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/contatodo-web

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: contatodo-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd:
    name: CD - Build & Push Docker
    needs: build

    if: github.event_name == 'push' && github.ref_name == 'master'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image-ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        name: Resolve Image Tags
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"

          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          IMAGE_REF="${IMAGE}:${BRANCH}-${SHORT_SHA}"

          {
            echo "tags<<EOF"
            echo "${IMAGE}:${BRANCH}"
            echo "${IMAGE_REF}"

            if [[ "$BRANCH" == "master" || "$BRANCH" == "main" ]]; then
              echo "${IMAGE}:latest"
            fi

            echo EOF
            echo "image_ref=${IMAGE_REF}"
          } >> "$GITHUB_OUTPUT"

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make image public
        run: |
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/contatodo-web \
            -d '{"visibility":"public"}' || true
